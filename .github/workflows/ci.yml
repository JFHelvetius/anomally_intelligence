name: CI

# Quality gates declarados en ADR-0031:
#
# - ruff: 0 errores en src + tests.
# - mypy strict: 0 errores en src + tests.
# - pytest: suite completa, 0 fallos.
# - Cobertura: ≥ 90% global.
#
# Plataforma de referencia (ADR-0029 §M3): Ubuntu (Linux x86_64).
# macOS arm64 y Windows x86_64 son **best-effort** (job separado con
# continue-on-error: true). Su rotura no bloquea merge, pero queda visible
# en el Checks tab y dispara investigación si los pinned hashes divergen
# entre plataformas (eso sería bug arquitectónico crítico, no degradación
# aceptable — ver ADR-0024 §formato canónico vs. motor).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- BLOQUEANTE: Ubuntu × Python 3.11/3.12 ------------------------------
  quality-gates:
    name: gates (Ubuntu / py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package + dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: mypy strict
        run: mypy

      - name: pytest with coverage
        run: pytest --cov=aip --cov-report=term --cov-fail-under=90 -q

      - name: Show coverage summary
        if: always()
        run: pytest --cov=aip --cov-report=term-missing -q --no-header

  # ---- BEST-EFFORT: macOS arm64 + Windows x86_64 --------------------------
  # Reproducibilidad cross-platform: los pinned hashes DEBEN coincidir aquí.
  # Si fallan, hay bug de canonicalización (R3, R5 del plan Pre-F1).
  # No bloqueante: el mantenedor único no opera en estas plataformas
  # cotidianamente. Cualquier fallo se investiga por issue, no por revert.
  cross-platform-smoke:
    name: smoke (${{ matrix.os }} / py3.11)
    needs: quality-gates
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: pytest (sin coverage, sin lint — solo invariantes)
        run: pytest -q
