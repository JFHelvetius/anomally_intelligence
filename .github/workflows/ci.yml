name: CI

# Quality gates declarados en ADR-0031:
#
# - ruff: 0 errores en src + tests.
# - mypy strict: 0 errores en src + tests.
# - pytest: suite completa, 0 fallos.
# - Cobertura: ≥ 90% global.
#
# Plataforma de referencia (ADR-0029 §M3): Ubuntu (Linux x86_64).
# macOS arm64 y Windows x86_64 son **best-effort** (job separado con
# continue-on-error: true). Su rotura no bloquea merge, pero queda visible
# en el Checks tab y dispara investigación si los pinned hashes divergen
# entre plataformas (eso sería bug arquitectónico crítico, no degradación
# aceptable — ver ADR-0024 §formato canónico vs. motor).
#
# Gestor de entornos: uv con uv.lock committeado (ADR-0029 §"Decisión" y §M2).
# `uv sync --frozen` instala exactamente las versiones del lockfile sin
# resolver de nuevo; las versiones de dependencias quedan pinned bit a bit
# entre el repositorio y CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Principio de mínimo privilegio: este workflow sólo lee el repositorio.
# No publica releases, no escribe comentarios en PRs, no toca el container
# registry. Si una acción transitiva intentara usar GITHUB_TOKEN para
# operaciones de escritura, fallará en vez de actuar silenciosamente.
permissions:
  contents: read

jobs:
  # ---- BLOQUEANTE: Ubuntu × Python 3.11/3.12 ------------------------------
  quality-gates:
    name: gates (Ubuntu / py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install package + dev tooling (frozen)
        run: uv sync --frozen --all-extras --python ${{ matrix.python-version }}

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: mypy strict
        run: uv run mypy

      - name: pytest with coverage
        run: uv run pytest --cov=aip --cov-report=term --cov-fail-under=90 -q

      - name: Show coverage summary
        if: always()
        run: uv run pytest --cov=aip --cov-report=term-missing -q --no-header

  # ---- BEST-EFFORT: macOS arm64 + Windows x86_64 --------------------------
  # Reproducibilidad cross-platform: los pinned hashes DEBEN coincidir aquí.
  # Si fallan, hay bug de canonicalización (R3, R5 del plan Pre-F1).
  # No bloqueante: el mantenedor único no opera en estas plataformas
  # cotidianamente. Cualquier fallo se investiga por issue, no por revert.
  cross-platform-smoke:
    name: smoke (${{ matrix.os }} / py3.11)
    needs: quality-gates
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install package + dev tooling (frozen)
        run: uv sync --frozen --all-extras --python 3.11

      - name: pytest (sin coverage, sin lint — solo invariantes)
        run: uv run pytest -q
